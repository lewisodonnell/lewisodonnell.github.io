# Selected work, rendered top-to-bottom.
# Adding a project = adding an entry here and, optionally, dropping an image
# into public/projects/. Nothing else to touch.
#
# Fields:
#   name        — project name
#   image       — optional, e.g. /projects/benchmark.png (omit or '' for none)
#   imageAlt    — alt text for the image (set it when you add an image)
#   description — two sentences: what you did and why it matters
#   links       — label → URL map. Non-URL values ([FILL]) are not rendered.

- name: '[FILL: benchmark name]'
  image: '' # e.g. /projects/benchmark.png
  imageAlt: ''
  description: >-
    An open-source benchmark for evaluating time-series foundation models on
    [FILL: domain/tasks]. [FILL: one sentence on scale or what it enables].
  links:
    Code: '[FILL: repo URL]'
    Paper: '[FILL: arXiv URL]'

